name: CI/CD Pipeline — Medical AI Assistant

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  # Docker Hub image name  →  your-dockerhub-username/medical-ai-assistant
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/medical-ai-assistant
  PYTHON_VERSION: "3.11"

jobs:
  # ────────────────────────────────────────────
  #  JOB 1: Lint & Static Analysis
  # ────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: |
          pip install --upgrade pip
          pip install flake8 black

      - name: Run flake8 (style & syntax)
        run: |
          flake8 app.py src/ store_index.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503

      - name: Run black (formatting check)
        run: |
          black --check --line-length=120 app.py src/ store_index.py

  # ────────────────────────────────────────────
  #  JOB 2: Unit Tests
  # ────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_API_ENV: ${{ secrets.PINECONE_API_ENV }}
          GOOGLE_API_KEY:   ${{ secrets.GOOGLE_API_KEY }}
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            || echo "No tests found — skipping."

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ────────────────────────────────────────────
  #  JOB 3: Build & Push Docker Image
  # ────────────────────────────────────────────
  docker-build-push:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    # Only push on pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag with the short Git SHA  →  e.g. sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # Tag as 'latest' on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Semantic version tags when a Git tag is pushed (e.g. v1.2.3)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Enable layer caching to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed image digest → ${{ steps.docker_build.outputs.digest }}"

  # ────────────────────────────────────────────
  #  JOB 4: Security Scan (Trivy)
  # ────────────────────────────────────────────
  security-scan:
    name: 🔒 Container Security Scan
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: "0"           # Set to "1" to fail the pipeline on HIGH/CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
        if: always()

  # ────────────────────────────────────────────
  #  JOB 5: Notify on Completion
  # ────────────────────────────────────────────
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build-push]
    if: always()

    steps:
      - name: Pipeline status summary
        run: |
          echo "============================================"
          echo " Medical AI Assistant — CI/CD Summary"
          echo "============================================"
          echo "Lint   : ${{ needs.lint.result }}"
          echo "Test   : ${{ needs.test.result }}"
          echo "Docker : ${{ needs.docker-build-push.result }}"
          echo "Commit : ${{ github.sha }}"
          echo "Branch : ${{ github.ref_name }}"
          echo "Actor  : ${{ github.actor }}"
          echo "============================================"
